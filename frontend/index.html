<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Supply Chain Dashboard</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f4f4f4;
    --surface2: #eaeaea;
    --border: #cccccc;
    --accent: #1976d2;
    --text: #111111;
    --muted: #555555;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
    min-height: 100vh;
  }

  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px;
  }

  .logo {
    margin-bottom: 20px;
  }

  .logo-top,
  .logo-title,
  .logo-sub {
    margin-bottom: 8px;
  }

  .logo-top {
    color: var(--accent);
    font-size: 13px;
  }

  .logo-title {
    font-size: 18px;
    font-weight: 700;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--muted);
  }

  .nav {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .nav-btn {
    padding: 10px 12px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text);
    text-align: left;
    cursor: pointer;
  }

  .nav-btn:hover,
  .nav-btn.active {
    background: var(--surface2);
    border-color: var(--border);
  }

  .sidebar-footer {
    margin-top: auto;
    font-size: 12px;
    color: var(--muted);
  }

  .main {
    margin-left: 220px;
    min-height: 100vh;
    padding: 16px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .page-title {
    font-size: 20px;
    font-weight: 700;
  }

  .page-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .refresh-btn {
    padding: 8px 14px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
  }

  .content {
    padding-top: 16px;
  }

  .stats-grid,
  .section-grid {
    display: grid;
    gap: 12px;
    margin-bottom: 16px;
  }

  .stats-grid {
    grid-template-columns: repeat(3, 1fr);
  }

  .section-grid {
    grid-template-columns: 1fr 1fr;
  }

  .stat-card,
  .panel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .panel-title {
    font-size: 14px;
    font-weight: 700;
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
  }

  .data-table th,
  .data-table td {
    padding: 10px;
    border: 1px solid var(--border);
    text-align: left;
  }

  .loading-state,
  .error-box,
  .empty-state {
    padding: 20px;
  }

  .error-box {
    background: #ffecec;
    border: 1px solid #f5c6cb;
    color: #a94442;
  }

  @media (max-width: 900px) {
    .sidebar {
      display: none;
    }
    .main {
      margin-left: 0;
    }
    .stats-grid,
    .section-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="logo">
    <div class="logo-top">⬡ Supply OS</div>
    <div class="logo-title">Chain<br>Dashboard</div>
    <div class="logo-sub">SupplyChainDB · MySQL</div>
  </div>
  <div class="nav" id="nav">
    <button class="nav-btn active" data-page="overview" onclick="setPage('overview',this)">
      <span class="nav-icon">◈</span> Overview
      <span class="status-dot"></span>
    </button>
    <button class="nav-btn" data-page="inventory" onclick="setPage('inventory',this)">
      <span class="nav-icon">▦</span> Inventory
    </button>
    <button class="nav-btn" data-page="orders" onclick="setPage('orders',this)">
      <span class="nav-icon">◎</span> Orders
    </button>
    <button class="nav-btn" data-page="shipments" onclick="setPage('shipments',this)">
      <span class="nav-icon">➤</span> Shipments
    </button>
    <button class="nav-btn" data-page="analytics" onclick="setPage('analytics',this)">
      <span class="nav-icon">◈</span> Analytics
    </button>
    <button class="nav-btn" data-page="chain" onclick="setPage('chain',this)">
      <span class="nav-icon">⬡</span> Full Chain
    </button>
  </div>
  <div class="sidebar-footer">
    API → localhost:5000<br>
    <span id="last-update">Connecting…</span>
  </div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="page-title" id="page-title">Overview</div>
      <div class="page-sub" id="page-sub">Supply Chain Intelligence Dashboard</div>
    </div>
    <div class="topbar-right">
      <div class="live-badge">
        <span class="status-dot"></span>
        LIVE
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">
        ↻ Refresh
      </button>
    </div>
  </div>

  <div class="content" id="content">
    <div class="loading-state"><div class="spinner"></div>Connecting to SupplyChainDB…</div>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';
let DATA = {};
let currentPage = 'overview';

const PAGES = {
  overview:  { title: 'Overview',      sub: 'Supply Chain Intelligence Dashboard' },
  inventory: { title: 'Inventory',     sub: 'Stock levels across all warehouses' },
  orders:    { title: 'Orders',        sub: 'All purchase orders & distributors' },
  shipments: { title: 'Shipments',     sub: 'Delivery tracking & logistics' },
  analytics: { title: 'Analytics',     sub: 'Demand & supplier performance' },
  chain:     { title: 'Full Chain',    sub: 'End-to-end supply chain view' },
};

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function loadAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  btn.textContent = '↻ Loading…';
  try {
    const [stats, inventory, orders, shipments, demand, supplierProducts, fullChain, suppliers, pending] =
      await Promise.all([
        fetchJSON(`${API}/stats`),
        fetchJSON(`${API}/inventory`),
        fetchJSON(`${API}/orders`),
        fetchJSON(`${API}/shipments`),
        fetchJSON(`${API}/analytics/high-demand`),
        fetchJSON(`${API}/analytics/supplier-products`),
        fetchJSON(`${API}/analytics/full-chain`),
        fetchJSON(`${API}/suppliers`),
        fetchJSON(`${API}/shipments/pending`),
      ]);
    DATA = { stats, inventory, orders, shipments, demand, supplierProducts, fullChain, suppliers, pending };
    document.getElementById('last-update').textContent = 'Updated ' + new Date().toLocaleTimeString();
    renderPage(currentPage);
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="error-box">⚠ Cannot connect to backend at <strong>${API}</strong><br><br>
      Make sure Node.js server is running:<br>
      <code>node server.js</code><br><br>Error: ${e.message}</div>`;
  }
  btn.classList.remove('loading');
  btn.textContent = '↻ Refresh';
}

function setPage(page, btn) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const meta = PAGES[page];
  document.getElementById('page-title').textContent = meta.title;
  document.getElementById('page-sub').textContent = meta.sub;
  renderPage(page);
}

function renderPage(page) {
  if (!DATA.stats) return;
  const c = document.getElementById('content');
  if (page === 'overview')  c.innerHTML = renderOverview();
  if (page === 'inventory') c.innerHTML = renderInventory();
  if (page === 'orders')    c.innerHTML = renderOrders();
  if (page === 'shipments') c.innerHTML = renderShipments();
  if (page === 'analytics') c.innerHTML = renderAnalytics();
  if (page === 'chain')     c.innerHTML = renderChain();
  // animate bars
  requestAnimationFrame(() => {
    document.querySelectorAll('.bar-fill[data-w]').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  });
}

function renderOverview() {
  const s = DATA.stats;
  const cards = [
    { label:'Suppliers',       value: s.suppliers,  sub:'Active vendors',         icon:'🏭', color:'var(--accent)',  delay:.0 },
    { label:'Products',        value: s.products,   sub:'SKUs in catalogue',       icon:'📦', color:'var(--accent2)', delay:.05 },
    { label:'Total Orders',    value: s.orders,     sub:'All time',               icon:'🧾', color:'var(--accent3)', delay:.1 },
    { label:'Pending Ships',   value: s.pending,    sub:'Awaiting delivery',       icon:'🚚', color:'var(--warn)',    delay:.15 },
    { label:'Revenue (₹)',     value: '₹'+Number(s.revenue).toLocaleString('en-IN'),  sub:'Gross order value', icon:'💰', color:'var(--accent3)', delay:.2 },
    { label:'Transport Cost',  value: '₹'+Number(s.transport).toLocaleString('en-IN'), sub:'Total logistics',  icon:'⛽', color:'var(--accent2)', delay:.25 },
  ];

  const statsHtml = cards.map(c => `
    <div class="stat-card" style="--card-color:${c.color}; animation-delay:${c.delay}s">
      <div class="stat-icon">${c.icon}</div>
      <div class="stat-label">${c.label}</div>
      <div class="stat-value" style="color:${c.color}">${c.value}</div>
      <div class="stat-sub">${c.sub}</div>
    </div>
  `).join('');

  // Suppliers table
  const suppHtml = DATA.suppliers.map(s => `
    <tr>
      <td><span class="hl">#${s.supplier_id}</span></td>
      <td>${s.name}</td>
      <td>${s.location}</td>
      <td><span class="hl3" style="font-family:var(--mono)">${s.contact}</span></td>
    </tr>
  `).join('');

  // Pending panel
  const pendHtml = DATA.pending.length === 0
    ? '<div class="empty-state">✓ No pending deliveries</div>'
    : DATA.pending.map(p => `
        <tr>
          <td><span class="hl">#${p.shipment_id}</span></td>
          <td>${p.product_name}</td>
          <td><span class="hl2">₹${p.transport_cost}</span></td>
          <td><span class="status-pill pending">Pending</span></td>
        </tr>
      `).join('');

  return `
    <div class="stats-grid">${statsHtml}</div>
    <div class="section-grid">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">🏭 Suppliers
            <span class="panel-badge">${DATA.suppliers.length} active</span>
          </div>
        </div>
        <table class="data-table">
          <thead><tr><th>ID</th><th>Name</th><th>Location</th><th>Contact</th></tr></thead>
          <tbody>${suppHtml}</tbody>
        </table>
      </div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">🚚 Pending Deliveries
            <span class="panel-badge ${DATA.pending.length > 0 ? 'warn' : 'ok'}">${DATA.pending.length} pending</span>
          </div>
        </div>
        <table class="data-table">
          ${DATA.pending.length > 0 ? '<thead><tr><th>Ship ID</th><th>Product</th><th>Cost</th><th>Status</th></tr></thead>' : ''}
          <tbody>${pendHtml}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderInventory() {
  const rows = DATA.inventory.map(i => {
    const pct = Math.min(100, (i.quantity / 100) * 100);
    const color = i.quantity === 0 ? 'var(--danger)' : i.quantity < 20 ? 'var(--warn)' : 'var(--accent3)';
    const badge = i.quantity === 0 ? 'danger' : i.quantity < 20 ? 'warn' : 'ok';
    const label = i.quantity === 0 ? 'OUT OF STOCK' : i.quantity < 20 ? 'LOW' : 'OK';
    return `
      <tr>
        <td>${i.product_name}</td>
        <td>
          <div style="display:flex;align-items:center;gap:10px;min-width:120px">
            <div class="bar-track" style="flex:1">
              <div class="bar-fill" style="--bar-color:${color};width:0" data-w="${pct}"></div>
            </div>
            <span class="hl" style="color:${color};font-family:var(--mono)">${i.quantity}</span>
          </div>
        </td>
        <td>${i.warehouse_location}</td>
        <td><span class="panel-badge ${badge}">${label}</span></td>
      </tr>
    `;
  }).join('');

  return `
    <div class="section-grid wide">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">▦ Inventory Levels</div>
          <span class="panel-badge">${DATA.inventory.length} products tracked</span>
        </div>
        <table class="data-table">
          <thead><tr><th>Product</th><th>Stock Level</th><th>Warehouse</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderOrders() {
  const rows = DATA.orders.map(o => `
    <tr>
      <td><span class="hl">#${o.order_id}</span></td>
      <td>${o.product_name}</td>
      <td><span class="hl2">${o.quantity}</span></td>
      <td><span style="font-family:var(--mono);font-size:12px">${o.order_date?.split('T')[0]||o.order_date}</span></td>
      <td>${o.distributor_name}</td>
    </tr>
  `).join('');

  return `
    <div class="section-grid wide">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">◎ Orders Register</div>
          <span class="panel-badge">${DATA.orders.length} orders</span>
        </div>
        <table class="data-table">
          <thead><tr><th>Order ID</th><th>Product</th><th>Quantity</th><th>Date</th><th>Distributor</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderShipments() {
  const rows = DATA.shipments.map(s => `
    <tr>
      <td><span class="hl">#${s.shipment_id}</span></td>
      <td>#${s.order_id}</td>
      <td>${s.product_name}</td>
      <td><span class="hl2">₹${s.transport_cost}</span></td>
      <td><span class="status-pill ${s.delivery_status==='Delivered'?'delivered':'pending'}">${s.delivery_status}</span></td>
    </tr>
  `).join('');

  const delivered = DATA.shipments.filter(s=>s.delivery_status==='Delivered').length;
  const pending   = DATA.shipments.filter(s=>s.delivery_status!=='Delivered').length;

  return `
    <div class="stats-grid" style="grid-template-columns:1fr 1fr 1fr">
      <div class="stat-card" style="--card-color:var(--accent3)">
        <div class="stat-label">Delivered</div>
        <div class="stat-value" style="color:var(--accent3)">${delivered}</div>
      </div>
      <div class="stat-card" style="--card-color:var(--warn)">
        <div class="stat-label">Pending</div>
        <div class="stat-value" style="color:var(--warn)">${pending}</div>
      </div>
      <div class="stat-card" style="--card-color:var(--accent2)">
        <div class="stat-label">Total Cost</div>
        <div class="stat-value" style="color:var(--accent2)">₹${DATA.shipments.reduce((a,s)=>a+Number(s.transport_cost),0).toLocaleString()}</div>
      </div>
    </div>
    <div class="section-grid wide">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">➤ Shipment Tracker</div>
          <span class="panel-badge">${DATA.shipments.length} shipments</span>
        </div>
        <table class="data-table">
          <thead><tr><th>Ship ID</th><th>Order</th><th>Product</th><th>Transport ₹</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderAnalytics() {
  const maxDemand = Math.max(...DATA.demand.map(d=>d.demand), 1);
  const demandBars = DATA.demand.map((d,i) => {
    const colors = ['var(--accent)', 'var(--accent2)', 'var(--accent3)'];
    const pct = (d.demand / maxDemand) * 100;
    return `
      <div class="bar-row">
        <div class="bar-label"><span>${d.name}</span><span>${d.demand} units</span></div>
        <div class="bar-track">
          <div class="bar-fill" style="--bar-color:${colors[i%3]};width:0" data-w="${pct}"></div>
        </div>
      </div>
    `;
  }).join('');

  const suppRows = DATA.supplierProducts.map(r => `
    <tr>
      <td>${r.supplier_name}</td>
      <td>${r.product_name}</td>
      <td><span class="hl2">₹${Number(r.price).toLocaleString('en-IN')}</span></td>
    </tr>
  `).join('');

  return `
    <div class="section-grid">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">📈 High Demand Products</div>
          <span class="panel-badge">>5 units ordered</span>
        </div>
        <div class="bar-chart">${demandBars || '<div class="empty-state">No high-demand products</div>'}</div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">🏭 Supplier Products</div>
          <span class="panel-badge">${DATA.supplierProducts.length} links</span>
        </div>
        <table class="data-table">
          <thead><tr><th>Supplier</th><th>Product</th><th>Price</th></tr></thead>
          <tbody>${suppRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderChain() {
  const rows = DATA.fullChain.map(r => `
    <div class="chain-row">
      <div>
        <div class="chain-label">PRODUCT</div>
        <div>${r.name}</div>
      </div>
      <div class="chain-arrow">→</div>
      <div>
        <div class="chain-label">STOCK</div>
        <div class="chain-val hl3">${r.stock} units</div>
      </div>
      <div class="chain-arrow">→</div>
      <div>
        <div class="chain-label">ORDERED</div>
        <div class="chain-val hl2">${r.order_qty} units</div>
      </div>
      <div class="chain-arrow">→</div>
      <div>
        <div class="chain-label">DELIVERY</div>
        <span class="status-pill ${r.delivery_status==='Delivered'?'delivered':'pending'}">${r.delivery_status}</span>
      </div>
    </div>
  `).join('');

  return `
    <div class="section-grid wide">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">⬡ Full Supply Chain View</div>
          <span class="panel-badge">${DATA.fullChain.length} flows</span>
        </div>
        ${rows || '<div class="empty-state">No chain data available</div>'}
      </div>
    </div>
  `;
}

// INIT
loadAll();
</script>
</body>
</html>
